# ============================================================
# Complex K8s Cluster: E-commerce Microservices Architecture
# ============================================================
# Namespace → 2 namespaces (prod, monitoring)
# Deployments → ReplicaSets → Pods (ownerReferences chains)
# Services → Pods (selector matching)
# Ingress → Services (backend routing)
# Pods → ConfigMaps, Secrets, PVCs (volume mounts)
# Pods → Nodes (scheduling)
# CronJob → Job → Pod (ownerReferences chain)
# DaemonSet → Pods (ownerReferences)
# StatefulSet → Pods (ownerReferences)
# HPA → Deployments (scaling target)
# ============================================================

# --- Namespaces ---
apiVersion: v1
kind: Namespace
metadata:
  name: prod
  labels:
    env: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    env: monitoring
---
# --- Cluster Nodes ---
apiVersion: v1
kind: Node
metadata:
  name: worker-node-1
  namespace: default
  labels:
    kubernetes.io/hostname: worker-node-1
    topology.kubernetes.io/zone: ap-northeast-2a
---
apiVersion: v1
kind: Node
metadata:
  name: worker-node-2
  namespace: default
  labels:
    kubernetes.io/hostname: worker-node-2
    topology.kubernetes.io/zone: ap-northeast-2b
---
# --- ConfigMaps ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: prod
data:
  RATE_LIMIT: "1000"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "https://shop.example.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: prod
data:
  POSTGRES_HOST: "postgresql-primary.prod.svc"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "redis-master.prod.svc"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    scrape_configs:
      - job_name: 'api-gateway'
        static_configs:
          - targets: ['api-gateway.prod.svc:8080']
---
# --- Secrets ---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: prod
type: Opaque
data:
  POSTGRES_PASSWORD: cGFzc3dvcmQxMjM=
  REDIS_PASSWORD: cmVkaXNwYXNz
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: prod
type: Opaque
data:
  JWT_SECRET: c3VwZXItc2VjcmV0LWtleQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-cert
  namespace: prod
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTi...
  tls.key: LS0tLS1CRUdJTi...
---
# --- PersistentVolumeClaims ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: prod
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: prod
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data-pvc
  namespace: monitoring
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Gi
---
# --- Deployments (prod) ---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: prod
  labels:
    app: api-gateway
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: frontend
    spec:
      containers:
        - name: api-gateway
          image: shop/api-gateway:v2.1
          ports:
            - containerPort: 8080
