# --- StatefulSet (PostgreSQL) ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-primary
  namespace: prod
  labels:
    app: postgresql
    role: primary
spec:
  serviceName: postgresql-primary
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
      role: primary
---
# StatefulSet Pod
apiVersion: v1
kind: Pod
metadata:
  name: postgresql-primary-0
  namespace: prod
  labels:
    app: postgresql
    role: primary
  ownerReferences:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: postgresql-primary
      uid: sts-pg-uid
spec:
  nodeName: worker-node-1
  containers:
    - name: postgresql
      image: postgres:16
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: postgres-data-pvc
    - name: db-creds
      secret:
        secretName: db-credentials
---
# StatefulSet Service (headless)
apiVersion: v1
kind: Service
metadata:
  name: postgresql-primary
  namespace: prod
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: postgresql
    role: primary
  ports:
